services:
  db:
    image: postgres:16-alpine
    container_name: playnext-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playnext}
      POSTGRES_USER: ${POSTGRES_USER:-playnext}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playnext}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playnext -d playnext"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: playnext-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-playnext}:${POSTGRES_PASSWORD:-playnext}@db:5432/${POSTGRES_DB:-playnext}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-playnext-secret-key}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: playnext-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"

volumes:
  postgres_data:
