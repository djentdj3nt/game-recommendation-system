<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayNext | Sign In</title>
    <meta name="description" content="PlayNext sign in" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="/assets/styles.css?v=17" />
  </head>
  <body class="auth-body">
    <div class="auth-layout">
      <section class="auth-card">
        <div class="auth-brand">
          <img class="auth-logo" src="/logo1.png" alt="PlayNext logo" />
        </div>

        <div class="tabs">
          <button class="tab-button active" data-auth-tab="login" type="button">Sign In</button>
          <button class="tab-button" data-auth-tab="register" type="button">Register</button>
        </div>

        <div class="auth-copy">
          <h2 id="authTitle">Welcome back</h2>
          <p id="authSubtitle">Sign in to continue.</p>
          <p class="auth-hint">Demo: demo@playnext.com / demo12345</p>
        </div>

        <form id="loginForm" class="auth-form">
          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="your@email.com" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input type="password" name="password" placeholder="Password" required />
          </label>
          <button class="primary-button auth-submit" type="submit">Sign In</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
          <label class="field">
            <span>Username</span>
            <input type="text" name="username" placeholder="Username" minlength="3" required />
          </label>
          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="your@email.com" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input type="password" name="password" placeholder="Password" minlength="6" required />
          </label>
          <button class="primary-button auth-submit" type="submit">Create Account</button>
        </form>
      </section>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="/assets/auth.js?v=7"></script>
  </body>
</html>
