<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayNext | Sign In</title>
    <meta
      name="description"
      content="PlayNext is a game discovery web app with ratings, reviews, and genre-based recommendations."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="auth-body">
    <div class="auth-layout">
      <section class="auth-hero">
        <div class="brand-badge">PlayNext</div>
        <h1>Find your next favorite game.</h1>
        <p>
          Discover games that match your mood, save favorite genres,
          rate titles, and share your opinion with other players.
        </p>
      </section>

      <section class="auth-panel">
        <div class="auth-card">
          <div class="tabs">
            <button class="tab-button active" data-auth-tab="login" type="button">Sign In</button>
            <button class="tab-button" data-auth-tab="register" type="button">Register</button>
          </div>

          <div class="auth-copy">
            <h2 id="authTitle">Welcome back</h2>
            <p id="authSubtitle">Use your email and password to enter PlayNext.</p>
          </div>

          <form id="loginForm" class="auth-form">
            <label class="field">
              <span>Email</span>
              <input type="email" name="email" placeholder="your@email.com" required />
            </label>
            <label class="field">
              <span>Password</span>
              <input type="password" name="password" placeholder="Minimum 6 characters" required />
            </label>
            <button class="primary-button auth-submit" type="submit">Sign In</button>
          </form>

          <form id="registerForm" class="auth-form hidden">
            <label class="field">
              <span>Username</span>
              <input type="text" name="username" placeholder="Choose a username" minlength="3" required />
            </label>
            <label class="field">
              <span>Email</span>
              <input type="email" name="email" placeholder="your@email.com" required />
            </label>
            <label class="field">
              <span>Password</span>
              <input type="password" name="password" placeholder="Minimum 6 characters" minlength="6" required />
            </label>
            <button class="primary-button auth-submit" type="submit">Create Account</button>
          </form>

          <p class="auth-note">
            Sign in to manage your profile, preferences, ratings, and reviews.
          </p>
        </div>
      </section>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="/assets/auth.js?v=3"></script>
  </body>
</html>
